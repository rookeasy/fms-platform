<svg width="244" height="88" viewBox="0 0 244 88" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Fuzion Operating Platform logo</title>
  <desc id="desc">FOP lifecycle F mark with neutral OP wordmark.</desc>
  <defs>
    <filter id="halo" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="4"/>
      <feColorMatrix type="matrix" values="1 0 0 0 0.91 0 1 0 0 0.47 0 0 1 0 0.45 0 0 0 0.28 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
  </defs>
  <rect x="1" y="1" width="86" height="86" rx="20" fill="#FFFFFF" stroke="#E2E8F0"/>
  <path d="M20 17H67V31H35V39H59V53H35V72H20V17Z" fill="none" stroke="#E97872" stroke-width="7" stroke-linejoin="round" opacity="0.46" filter="url(#halo)"/>
  <path d="M20 17H35V72H20V17Z" fill="#A8E96A"/>
  <path d="M20 17H67V31H20V17Z" fill="#DDE2EA"/>
  <path d="M20 39H59V53H20V39Z" fill="#1769FF"/>
